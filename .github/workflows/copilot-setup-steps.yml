name: Copilot Setup Steps

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  setup-and-verify:
    name: setup-and-verify
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Prepare environment
        run: |
          set -euxo pipefail
          python --version
          pip --version
          make --version

      - name: Run repository verification
        run: |
          set -euxo pipefail
          make verify
